name: Deploy Pipeline
on:
  push:
    branches: [ main, staging ]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push
        run: |
          docker build -t ghcr.io/${{ github.repository }}/${{ github.ref_name }}:latest ./apps/web
          docker push ghcr.io/${{ github.repository }}/${{ github.ref_name }}:latest
